<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UP Quiz – Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#F2F6F6;--surface:#fff;--ink:#1A1A1A;--dim:#6B7B7B;--border:#C8DEDE;--teal:#169b9d;--teal-lt:#E6F5F5;--teal-bd:#7DCFCF;--orange:#E8400C;--red-bg:#FFF0ED;--red-bd:#f8c4b8;}
html{font-size:16px;}
body{background:var(--bg);font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:0 0 48px;}

.topbar{width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-logo{width:40px;height:40px;background:var(--teal);border-radius:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(22,155,157,.25);}
.tb-title{font-size:1rem;font-weight:700;color:var(--ink);}
.tb-sub{font-size:.72rem;color:var(--dim);}
.live-badge{display:flex;align-items:center;gap:5px;background:var(--teal-lt);border:1.5px solid var(--teal-bd);border-radius:999px;padding:5px 12px;font-size:.75rem;font-weight:600;color:var(--teal);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.stats-row{display:flex;gap:10px;padding:16px 20px;width:100%;max-width:600px;}
.stat-card{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;text-align:center;}
.stat-card .sv{font-family:'IBM Plex Mono',monospace;font-size:1.5rem;font-weight:700;color:var(--teal);line-height:1;}
.stat-card .sl{font-size:.7rem;color:var(--dim);font-weight:500;margin-top:3px;}

.lb-wrap{width:100%;max-width:600px;padding:0 20px;}
.lb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.lb-title{font-size:1rem;font-weight:700;color:var(--ink);}
.lb-updated{font-size:.72rem;color:var(--dim);}

.lb-row{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lb-row.rank-1{border-color:#F5C842;background:linear-gradient(135deg,#FFFBEA,#fff);}
.lb-row.rank-2{border-color:#D0D7E0;}
.lb-row.rank-3{border-color:#C8A882;}

.rank-badge{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:.9rem;flex-shrink:0;}
.rank-badge.r1{background:#F5C842;color:#6B4900;}
.rank-badge.r2{background:#D0D7E0;color:#4A5568;}
.rank-badge.r3{background:#C8A882;color:#5C3317;}
.rank-badge.rn{background:var(--bg);color:var(--dim);border:1.5px solid var(--border);}

.lb-info{flex:1;min-width:0;}
.lb-name{font-size:.95rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.lb-detail{font-size:.72rem;color:var(--dim);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.status-badge{font-size:.65rem;font-weight:700;border-radius:999px;padding:2px 8px;white-space:nowrap;}
.status-pass{color:var(--teal);background:var(--teal-lt);border:1px solid var(--teal-bd);}
.status-fail{color:var(--orange);background:var(--red-bg);border:1px solid var(--red-bd);}

.pct-col{text-align:right;flex-shrink:0;}
.pct-num{font-family:'IBM Plex Mono',monospace;font-size:1.2rem;font-weight:700;}
.pct-label{font-size:.65rem;color:var(--dim);font-weight:500;}

.mini-bar-wrap{margin-top:5px;}
.mini-bar-track{height:4px;background:var(--bg);border-radius:4px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}

.empty{text-align:center;padding:48px 20px;color:var(--dim);}
.empty-emoji{font-size:2.5rem;margin-bottom:12px;}
.empty p{font-size:.9rem;line-height:1.6;}

.loading{text-align:center;padding:32px;color:var(--dim);font-size:.9rem;}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <div class="tb-logo">
      <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
        <rect x="9" y="16" width="30" height="24" rx="2" fill="white" opacity="0.2"/>
        <rect x="9" y="16" width="30" height="24" rx="2" stroke="white" stroke-width="2.5"/>
        <polyline points="7,17 24,5 41,17" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="19" y="28" width="10" height="12" rx="1.5" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div>
      <div class="tb-title">Leaderboard</div>
      <div class="tb-sub">9 บริการจาก "UP" · FAM's Team</div>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>Real-time</div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="sv" id="stat-total">—</div><div class="sl">ผู้เล่น</div></div>
  <div class="stat-card"><div class="sv" id="stat-pass">—</div><div class="sl">ผ่าน</div></div>
  <div class="stat-card"><div class="sv" id="stat-top">—</div><div class="sl">สูงสุด</div></div>
</div>

<div class="lb-wrap">
  <div class="lb-header">
    <div class="lb-title">🏅 ตารางคะแนน</div>
    <div class="lb-updated" id="lb-updated">กำลังโหลด...</div>
  </div>
  <div id="lb-list"><div class="loading">กำลังโหลด...</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCzk2-45-QOMuU6K2iBSJy4Z7eFYhrKa0E",
  authDomain: "famlpp.firebaseapp.com",
  databaseURL: "https://famlpp-default-rtdb.firebaseio.com",
  projectId: "famlpp",
  storageBucket: "famlpp.firebasestorage.app",
  messagingSenderId: "520388302414",
  appId: "1:520388302414:web:673e76dd3c40a77f96551f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const MEDALS = ['🥇','🥈','🥉'];

function fmtAgo(ts){
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<60)return d+'s ที่แล้ว';
  if(d<3600)return Math.floor(d/60)+'m ที่แล้ว';
  if(d<86400)return Math.floor(d/3600)+'h ที่แล้ว';
  return Math.floor(d/86400)+'d ที่แล้ว';
}

// Real-time listener
onValue(ref(db,'scores'), (snap)=>{
  const list=document.getElementById('lb-list');
  const upd=document.getElementById('lb-updated');

  if(!snap.exists()){
    list.innerHTML=`<div class="empty"><div class="empty-emoji">🏗️</div><p>ยังไม่มีผู้เล่น<br>เปิดเกมแล้วเริ่มเล่นกันเลย!</p></div>`;
    upd.textContent='ไม่มีข้อมูล';
    document.getElementById('stat-total').textContent='0';
    document.getElementById('stat-pass').textContent='0';
    document.getElementById('stat-top').textContent='—';
    return;
  }

  const entries=Object.values(snap.val());

  // Sort: score DESC, finishedAt ASC (earlier = better when tied)
  entries.sort((a,b)=> b.score!==a.score ? b.score-a.score : a.finishedAt-b.finishedAt);

  // Stats
  const passed=entries.filter(e=>e.passed).length;
  const top=Math.max(...entries.map(e=>e.score));
  document.getElementById('stat-total').textContent=entries.length;
  document.getElementById('stat-pass').textContent=passed;
  document.getElementById('stat-top').textContent=top+'%';

  list.innerHTML='';
  entries.forEach((e,i)=>{
    const rank=i+1;
    const rc=rank<=3?'r'+rank:'rn';
    const rl=rank<=3?MEDALS[i]:rank;
    const div=document.createElement('div');
    div.className='lb-row'+(rank<=3?' rank-'+rank:'');

    const statusBadge=e.passed
      ?`<span class="status-badge status-pass">✅ ผ่าน</span>`
      :`<span class="status-badge status-fail">❌ ไม่ผ่าน</span>`;

    const barColor=e.passed
      ?'linear-gradient(90deg,#169b9d,#0fc4c6)'
      :'linear-gradient(90deg,#E8400C,#ff6b35)';

    const pctColor=e.passed?'var(--teal)':'var(--orange)';

    div.innerHTML=`
      <div class="rank-badge ${rc}">${rl}</div>
      <div class="lb-info">
        <div class="lb-name">${e.name} ${statusBadge}</div>
        <div class="lb-detail">
          <span>✅ ${e.wins||0}/20</span>
          <span>❤️ ${e.livesLeft!==undefined?e.livesLeft:'—'}/5</span>
          <span>⏱ ${e.time||'—'}</span>
          <span>${fmtAgo(e.finishedAt)}</span>
        </div>
        <div class="mini-bar-wrap">
          <div class="mini-bar-track">
            <div class="mini-bar-fill" style="width:${e.score}%;background:${barColor}"></div>
          </div>
        </div>
      </div>
      <div class="pct-col">
        <div class="pct-num" style="color:${pctColor}">${e.score}%</div>
        <div class="pct-label">คะแนน</div>
      </div>
    `;
    list.appendChild(div);
  });

  const now=new Date();
  upd.textContent=`อัปเดต ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} น.`;
}, (err)=>{
  document.getElementById('lb-list').innerHTML=`<div class="empty"><div class="empty-emoji">⚠️</div><p>ไม่สามารถโหลดข้อมูลได้</p></div>`;
  console.error(err);
});
</script>
</body>
</html>
